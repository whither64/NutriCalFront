version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: nutrical-db
    environment:
      POSTGRES_USER: nutrical_user
      POSTGRES_PASSWORD: nutrical_password
      POSTGRES_DB: nutrical
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nutrical_user -d nutrical"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: nutrical-backend
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    environment:
      - PORT=3000
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=nutrical
      - DB_USER=nutrical_user
      - DB_PASSWORD=nutrical_password
      - DATABASE_URL=postgresql://nutrical_user:nutrical_password@db:5432/nutrical?schema=public
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build: ./frontend
    container_name: nutrical-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:3000

volumes:
  postgres_data:
